apiVersion: v1
kind: Service
metadata:
  name: temperaturas-frontend
  labels:
    app: frontend-temperaturas
spec:
  type: LoadBalancer
  ports:
    - port: 3001
  selector:
    app: frontend-temperaturas
    tier: frontend
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temperaturas-frontend
  labels:
    app: frontend-temperaturas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend-temperaturas
      tier: frontend
  template:
    metadata:
      labels:
        app: frontend-temperaturas
        tier: frontend
    spec:
      containers:
        - name: frontend
          image: borjazg28734/temperaturas-frontend
          ports:
            - containerPort: 3001